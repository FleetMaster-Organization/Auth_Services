spring:
  application:
    name: auth-security
  # Configuración PostgreSQL (Supabase/TiDB)
  datasource:
    url: jdbc:postgresql://${TIDB_HOST}:${TIDB_PORT:6543}/${TIDB_DB}?currentSchema=auth_db&sslmode=require
    username: ${TIDB_USER}
    password: ${TIDB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update

# Configuración del Servidor
server:
  port: ${PORT:8080}

# Eureka: Registro y Descubrimiento
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Monitoreo y Salud
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# Feign: Comunicación entre microservicios
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# Configuración JWT Personalizada
app:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

# Documentación API
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
