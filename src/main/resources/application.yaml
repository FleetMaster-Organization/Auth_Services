spring:
  application:
    name: auth-security

  # Configuración para TiDB (Protocolo MySQL)
  datasource:
    url: jdbc:mysql://${TIDB_HOST}:${TIDB_PORT:4000}/${TIDB_DB}
    username: ${TIDB_USER}
    password: ${TIDB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080

#Eureka: Servicio de registro de direcciones para la ApiGateway
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    # Esto es vital en Cloud Run para que Eureka no use IPs internas que cambian
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
#FeignClient: Servicio que permite la comunicacion entre microservicios
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

#Configuración JWT para autenticación
app:
  jwt:
    # Clave secreta para firmar los tokens JWT (HS256)
    secret: ${JWT_SECRET}
    # Tiempo de expiración para access token (5 minutos en milisegundos)
    access-expiration: ${JWT_ACCESS_EXPIRATION:300000}
    # Tiempo de expiración para refresh token (7 días en milisegundos)
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}