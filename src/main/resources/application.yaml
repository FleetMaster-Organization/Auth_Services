spring:
  application:
    name: auth-security

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  port: 8081

#Eureka: Servicio de registro de direcciones para la ApiGateway
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    # Esto es vital en Cloud Run para que Eureka no use IPs internas que cambian
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always
#FeignClient: Servicio que permite la comunicacion entre microservicios
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

#Configuración JWT para autenticación
app:
  jwt:
    # Clave secreta para firmar los tokens JWT (HS256)
    secret: ${JWT_SECRET}
    # Tiempo de expiración para access token (15 minutos en milisegundos)
    access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
    # Tiempo de expiración para refresh token (7 días en milisegundos)
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  springdoc:
    swagger-ui:
      path: /swagger-ui.html
    api-docs:
      path: /v3/api-docs